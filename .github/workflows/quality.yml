name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Domain correctness tests
        run: npm run test:domain

      - name: Expo config validation
        run: npm run check:expo-config

      - name: Web export smoke test
        env:
          CI: true
        run: npm run check:web-export
